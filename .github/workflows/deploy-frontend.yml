name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        env:
          ECR_REGISTRY: 029180756761.dkr.ecr.sa-east-1.amazonaws.com
          IMAGE_TAG: latest
        run: |
          docker build -t "$ECR_REGISTRY/velasco-frontend:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/velasco-frontend:$IMAGE_TAG"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd ~/velasco-frontend
            git pull origin main
            aws ecr get-login-password --region sa-east-1 | docker login --username AWS --password-stdin 029180756761.dkr.ecr.sa-east-1.amazonaws.com
            docker compose pull
            docker compose up -d
            docker compose logs frontend
